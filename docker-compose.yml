services:
  backend:
    build: ./backend
    ports:
      - "31338:8000"
    env_file:
      - .env
    volumes:
      - ./tokens.json:/app/tokens.json
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "31337:80"
    depends_on:
      - backend
    restart: unless-stopped
