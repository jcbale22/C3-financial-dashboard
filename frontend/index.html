<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>C3 Church · Financial Dashboard</title>
    <!-- Apply theme before React hydrates to prevent flash -->
    <script>
      try {
        const t = localStorage.getItem('c3-theme')
        const sys = window.matchMedia('(prefers-color-scheme: dark)').matches
        if (t === 'dark' || (!t && sys)) document.documentElement.classList.add('dark')
      } catch(e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
